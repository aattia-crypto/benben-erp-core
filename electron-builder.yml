appId: com.benben.erp
productName: Benben ERP
copyright: Copyright © 2026 Benben Software, Inc.

# Installer / artifact naming (Windows RC)
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: release
  # Corporate icons + NSIS artwork (LICENSE / custom hooks remain under resources/)
  buildResources: build

# Embedded PostgreSQL — MUST live outside app.asar (Windows cannot execute binaries from ASAR).
# Installed layout: <app>/resources/postgres/win-x64/{bin,lib,share}
extraResources:
  - from: "resources/postgres"
    to: "postgres"
    filter:
      - "win-x64/bin/**"
      - "win-x64/lib/**"
      - "win-x64/share/**"
      - "!**/pgAdmin/**"
      - "!**/pgAdmin 4/**"
      - "!**/*.log"
      - "!**/*.md"
      - "!**/doc/**"
      - "!**/docs/**"
      - "!**/include/**"
      - "!**/symbols/**"

# Prisma CLI, engines, schema, and migrations must be on a real filesystem path.
files:
  - dist-desktop/**/*
  - renderer-dist/**/*
  - package.json
  - "!**/*.map"
  - "!renderer-dist/.stage-fingerprint.json"
  # Never pack native PG binaries into the ASAR archive
  - "!resources/postgres{,/**}"
  - prisma/schema.prisma
  - prisma/migrations/**/*
  # Generated by `prisma generate`; @prisma/client/default.js requires sibling .prisma/client/default
  - from: node_modules/.prisma
    to: node_modules/.prisma
    filter:
      - "**/*"
  # @prisma/config runtime deps (e.g. effect) — hoisted outside node_modules/@prisma/*
  - node_modules/@standard-schema/spec/**
  - node_modules/c12/**
  - node_modules/chokidar/**
  - node_modules/citty/**
  - node_modules/confbox/**
  - node_modules/consola/**
  - node_modules/deepmerge-ts/**
  - node_modules/defu/**
  - node_modules/destr/**
  - node_modules/dotenv/**
  - node_modules/effect/**
  - node_modules/empathic/**
  - node_modules/exsolve/**
  - node_modules/fast-check/**
  - node_modules/giget/**
  - node_modules/jiti/**
  - node_modules/node-fetch-native/**
  - node_modules/nypm/**
  - node_modules/ohash/**
  - node_modules/pathe/**
  - node_modules/perfect-debounce/**
  - node_modules/pkg-types/**
  - node_modules/pure-rand/**
  - node_modules/rc9/**
  - node_modules/readdirp/**
  - node_modules/tinyexec/**

asarUnpack:
  - renderer-dist/**
  - prisma/**
  - node_modules/.prisma/**
  - node_modules/@prisma/**
  - node_modules/prisma/**
  - node_modules/@standard-schema/spec/**
  - node_modules/c12/**
  - node_modules/chokidar/**
  - node_modules/citty/**
  - node_modules/confbox/**
  - node_modules/consola/**
  - node_modules/deepmerge-ts/**
  - node_modules/defu/**
  - node_modules/destr/**
  - node_modules/dotenv/**
  - node_modules/effect/**
  - node_modules/empathic/**
  - node_modules/exsolve/**
  - node_modules/fast-check/**
  - node_modules/giget/**
  - node_modules/jiti/**
  - node_modules/node-fetch-native/**
  - node_modules/nypm/**
  - node_modules/ohash/**
  - node_modules/pathe/**
  - node_modules/perfect-debounce/**
  - node_modules/pkg-types/**
  - node_modules/pure-rand/**
  - node_modules/rc9/**
  - node_modules/readdirp/**
  - node_modules/tinyexec/**
  - "**/*.node"

win:
  executableName: Benben ERP
  icon: build/icon.ico
  legalTrademarks: Benben Software, Inc.
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Benben ERP
  menuCategory: true
  runAfterFinish: true
  uninstallDisplayName: Benben ERP
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  license: resources/LICENSE.txt
  # Merged with resources/installer.nsh — interactive AppData purge on uninstall.
  include: resources/installer.nsh
  displayLanguageSelector: false
  artifactName: ${productName}-Setup-${version}.${ext}
