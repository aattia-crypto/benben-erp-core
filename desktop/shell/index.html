<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>Benben ERP</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        max-width: 32rem;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #94a3b8;
        line-height: 1.5;
        font-size: 0.95rem;
      }
      code {
        background: #1e293b;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Benben ERP</h1>
      <p>
        The desktop shell is running. UI bundling for production builds will be
        connected in a later phase.
      </p>
      <p>
        For development, start the ERP UI from
        <code>nexuscore-erp-main</code>, then launch
        <code>npm run dev</code> at the repository root with
        <code>BENBEN_UI_URL</code> (or legacy <code>NEXUSCORE_UI_URL</code>) pointing at your dev server.
      </p>
    </main>
    <script>
      var api = window.benben || window.nexuscore;
      if (api) {
        api.app.ping().then(function (r) {
          console.log("Benben IPC:", r);
        });
      }
    </script>
  </body>
</html>
